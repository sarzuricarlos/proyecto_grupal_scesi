<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <link rel='shortcut icon' href='../icons/logo_git-background.ico' type='image/x-icon'>
  <link rel='stylesheet' href='../css/index.css'>
  <title>Sugerencias — Los Viciosos del Git</title>
</head>
<body>
  <header class='cabecera_home'>
    <img src='../imgs/logo_git-background.png' alt='Logo Git' height='120'>
    <div class='cabecera_texto'>
      <h1>Los Viciosos del Git</h1>
      <h2>Dejanos tu sugerencia</h2>
    </div>
    <input type='text' placeholder='Buscar...' class='cabecera_search'>
  </header>
  <main class='contenedor_principal'>
    <aside class='panel_opciones'>
      <nav><ul>
        <li><a href='../../index.html'>Inicio</a></li>
        <li><a href='nosotros.html'>Nosotros</a></li>
        <li><a href='top.html'>Top Git</a></li>
        <li><a href='sugerencias.html' class='activo'>Sugerencias</a></li>
      </ul></nav>
    </aside>
    <section class='panel_contenido'>
      <h2>Envianos una Sugerencia</h2>
      <p>Tienes alguna idea o comentario para mejorar este sitio? Escribenos.</p>
      <form class='formulario_sugerencias'>
        <div>
          <label for='nombre'>Nombre</label>
          <input type='text' id='nombre' placeholder='Tu nombre' required>
        </div>
        <div>
          <label for='correo'>Correo</label>
          <input type='email' id='correo' placeholder='tu@correo.com' required>
        </div>
        <div>
          <label for='mensaje'>Mensaje</label>
          <textarea id='mensaje' placeholder='Escribe tu sugerencia aqui...' required></textarea>
        </div>
        <button type='submit'>Enviar sugerencia →</button>
      </form>
    </section>
  </main>
</body>
</html>
